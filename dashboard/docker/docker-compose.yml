version: '3.8'

services:
  fx-predict:
    build:
      context: ../..
      dockerfile: dashboard/docker/Dockerfile
    container_name: fx-predict-app
    restart: unless-stopped
    
    # 端口映射
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    
    # 环境变量
    environment:
      - NODE_ENV=production
      - PORT=3000
      - PYTHONUNBUFFERED=1
      - TZ=${TIMEZONE:-Asia/Shanghai}
    
    # Volume 挂载
    volumes:
      # 挂载 .env 配置文件（宿主机更新自动生效）
      - ../../.env:/app/.env:ro
      
      # 挂载数据目录
      - ../../data/raw:/app/data/raw
      - ../../data/models:/app/data/models
      - ../../data/predictions:/app/data/predictions
      
      # 挂载日志目录
      - ../../logs:/app/logs
    
    # 网络配置
    networks:
      - fx-predict-network
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    # 健康检查
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  fx-predict-network:
    driver: bridge